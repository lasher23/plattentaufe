{{ define "main" }}
<div class="page-wrapper">
  <a class="back-link" href="/posts/">← Zurück zum Reiseblog</a>

  <article>
    <header>
      <div class="post-date">{{ .Date.Format "02. January 2006" }}</div>
      <h1 class="post-title">{{ .Title }}</h1>
      {{ with .Description }}
      <p class="post-description">{{ . }}</p>
      {{ end }}
    </header>

    <div class="post-content">
      {{ .Content }}
    </div>
  </article>
</div>
{{ end }}
