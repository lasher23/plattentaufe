<div class="header-inner">
  <a href="{{ site.Home.RelPermalink }}" class="site-logo">
    <img src="https://image.jimcdn.com/app/cms/image/transf/none/path/s3cfddd76ed1fd136/image/i43e5bb1bfe0b3b3f/version/1768506978/image.png"
         alt="{{ site.Title }}" width="44" height="44" loading="eager">
    <span class="site-logo-text">{{ site.Params.siteTitle }}</span>
  </a>

  <button class="nav-toggle" id="nav-toggle" aria-label="Navigation öffnen" aria-controls="main-nav" aria-expanded="false">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <nav class="main-nav" id="main-nav" aria-label="Hauptnavigation">
    <ul>
      {{ range site.Menus.main }}
      <li>
        <a href="{{ .URL }}"{{ if eq $.RelPermalink .URL }} class="active" aria-current="page"{{ end }}>{{ .Name }}</a>
      </li>
      {{ end }}
    </ul>
  </nav>
</div>
